        readOnly: false
        destructive: false
        idempotent: false
      call: platform-integrations.createintegration
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: jetic-get-integration
      description: Jetic Get an integration
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-integrations.getintegration
      outputParameters:
