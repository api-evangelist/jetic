          type: integer
          description: Page number for pagination.
        - name: limit
          in: query
          type: integer
          description: Number of results per page.
        - name: status
          in: query
          type: string
          description: Filter by integration status.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
